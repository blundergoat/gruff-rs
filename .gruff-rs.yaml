# gruff-rs default configuration.
#
# Generated by `gruff-rs init` from the built-in rule registry.
# Rule ids and metadata can be discovered with `gruff-rs rules`.
# Per-rule thresholds and severities can be tuned in place; see the
# README for the full configuration shape (paths, allowlists, rules,
# custom_rules, exclude).
#
# For an existing project, run `gruff-rs analyse --generate-baseline`
# to accept today's findings as the starting point.

paths:
  # Discovery-time do-not-read patterns. Use this for generated
  # build/vendor artifacts; use `gruff-rs analyse --generate-baseline`
  # or top-level `exclude` entries for accepted findings.
  ignore:
    - .agents/**
    - .antigravitycli/**
    - .claude/**
    - .codex/**
    - .github/**
    - .goat-flow/**
    - target/**
    - fixtures/**
    - tests/fixtures/**
    - node_modules/**
    - "**/Cargo.lock"
    - "**/package-lock.json"
    - "**/yarn.lock"
    - "**/pnpm-lock.yaml"

allowlists:
  acceptedAbbreviations:
    - id
    - db
    - io
    - ui
    - tx
    - rx
  secretPreviews: []

rules:
  # Flags modules with more indexed items than the configured threshold.
  architecture.large-module:
    enabled: true
    threshold: 25
    severity: advisory
  # Flags files that declare many child modules.
  architecture.module-fan-out:
    enabled: true
    threshold: 8
    severity: advisory
  # Flags modules with many public exports.
  architecture.public-api-surface:
    enabled: true
    threshold: 12
    severity: advisory
  # Flags GitHub event values interpolated directly into workflow shell steps.
  ci.github-event-shell-interpolation:
    enabled: true
  # Flags functions with high cognitive complexity.
  complexity.cognitive:
    enabled: true
    threshold: 15
    severity: warning
  # Flags functions with high branch and decision complexity.
  complexity.cyclomatic:
    enabled: true
    threshold: 10
    severity: warning
  # Flags functions with deeply nested control flow.
  complexity.nesting-depth:
    enabled: true
    threshold: 4
    severity: warning
  # Flags functions with many approximate execution paths.
  complexity.npath:
    enabled: true
    threshold: 100
    severity: warning
  # Flags narrow blocking call patterns inside async functions.
  concurrency.blocking-call-in-async:
    enabled: true
  # Flags lock guard bindings that appear to live across an await point.
  concurrency.lock-across-await:
    enabled: true
  # Flags unbounded channel constructors in production code.
  concurrency.unbounded-channel:
    enabled: true
  # Flags paths.ignore entries that can hide security-relevant files from analysis.
  config.security-blind-ignore:
    enabled: true
  # Flags private functions with no same-file call sites.
  dead-code.unused-private-function:
    enabled: true
  # Flags private items whose names are not referenced elsewhere in discovered Rust sources.
  dead-code.unused-private-item-candidate:
    enabled: true
  # Flags packages locked at more versions than the configured threshold.
  dependency.duplicate-locked-version:
    enabled: true
    threshold: 1
    severity: advisory
  # Flags dependencies sourced directly from git repositories.
  dependency.git-source:
    enabled: true
  # Flags git dependencies that do not pin a fixed rev.
  dependency.git-unpinned-revision:
    enabled: true
  # Flags packages missing description or license metadata.
  dependency.missing-package-metadata:
    enabled: true
  # Flags dependencies sourced from local filesystem paths.
  dependency.path-source:
    enabled: true
  # Flags dependency requirements that use wildcard versions.
  dependency.wildcard-version:
    enabled: true
  # Flags functions that are both long and complex.
  design.god-function:
    enabled: true
  # Flags comments whose payload looks like a disabled Rust statement or item.
  docs.commented-out-code:
    enabled: true
  # Flags externally public functions returning Result without a # Errors rustdoc section.
  docs.missing-errors-section:
    enabled: true
  # Flags public Rust API items without doc comments.
  docs.missing-public-doc:
    enabled: true
  # Flags projects without a root README file.
  docs.missing-readme:
    enabled: true
  # Flags TODO/FIXME/HACK/XXX comments without an owner, issue reference, or reason.
  docs.stale-todo:
    enabled: true
  # Flags unsafe blocks whose nearby SAFETY: rationale is too short or vague.
  docs.weak-safety-rationale:
    enabled: true
  # Flags panic! calls in non-test functions without a local invariant comment.
  error-handling.production-panic:
    enabled: true
  # Flags unwrap or expect calls in public non-test functions.
  error-handling.public-unwrap:
    enabled: true
  # Flags todo! and unimplemented! placeholders in non-test functions.
  error-handling.unimplemented-placeholder:
    enabled: true
  # Flags functions whose deterministic token volume exceeds the configured threshold.
  metrics.halstead-volume:
    enabled: true
    threshold: 1500
    severity: advisory
  # Flags functions whose maintainability pressure score falls below the configured minimum.
  metrics.maintainability-pressure:
    enabled: true
    threshold: 45
    severity: advisory
  # Flags public struct fields that expose representation.
  modernisation.public-field:
    enabled: true
  # Flags bool-returning functions whose names do not read like predicates.
  naming.boolean-prefix:
    enabled: true
  # Flags function names that are too generic to explain intent.
  naming.generic-function:
    enabled: true
  # Flags `let X = X(...)` bindings that shadow a same-file free function.
  naming.identifier-shadow:
    enabled: true
  # Flags placeholder identifiers such as foo, bar, baz, and qux.
  naming.placeholder-identifier:
    enabled: true
  # Flags very short local variable names outside accepted abbreviations.
  naming.short-variable:
    enabled: true
  # Flags clone calls inside loop bodies as allocation hot spot candidates.
  performance.clone-in-loop:
    enabled: true
  # Flags format! calls inside loop bodies as allocation hot spot candidates.
  performance.format-in-loop:
    enabled: true
  # Flags Regex::new calls inside loop bodies.
  performance.regex-in-loop:
    enabled: true
  # Flags non-cryptographic rand calls inside secret-like generation functions.
  security.insecure-rng-for-secrets:
    enabled: true
  # Flags process command construction for manual argument validation.
  security.process-command:
    enabled: true
  # Flags direct dynamic SQL query arguments such as query(format!(...)).
  security.sql-dynamic-query:
    enabled: true
  # Flags explicit TLS certificate or hostname verification bypasses.
  security.tls-verification-disabled:
    enabled: true
  # Flags unsafe blocks without a nearby SAFETY rationale.
  security.unsafe-block:
    enabled: true
  # Flags explicit weak cryptographic primitive imports or constructors for review.
  security.weak-crypto:
    enabled: true
  # Flags common API key patterns.
  sensitive-data.api-key-pattern:
    enabled: true
  # Flags AWS access key patterns.
  sensitive-data.aws-access-key:
    enabled: true
  # Flags database URLs that appear to include passwords.
  sensitive-data.database-url-password:
    enabled: true
  # Flags secret-like KEY=value literals committed in source or config.
  sensitive-data.hardcoded-env-value:
    enabled: true
  # Flags long string literals that look like generated secrets.
  sensitive-data.high-entropy-string:
    enabled: true
  # Flags JWT-looking token strings.
  sensitive-data.jwt-token:
    enabled: true
  # Flags private key block markers.
  sensitive-data.private-key:
    enabled: true
  # Flags HTTP(S) URLs that include embedded username and password credentials.
  sensitive-data.url-embedded-credentials:
    enabled: true
  # Flags files over the configured line-count threshold.
  size.file-length:
    enabled: true
    threshold: 600
    severity: warning
  # Flags functions over the configured line-count threshold.
  size.function-length:
    enabled: true
    threshold: 50
    severity: warning
  # Flags functions with too many parameters.
  size.parameter-count:
    enabled: true
    threshold: 5
    severity: warning
  # Flags tests that contain conditional logic.
  test-quality.conditional-logic:
    enabled: true
  # Flags ignored tests that do not explain why they are skipped.
  test-quality.ignored-without-reason:
    enabled: true
  # Flags long test functions that are harder to scan and maintain.
  test-quality.long-test:
    enabled: true
    threshold: 80
    severity: advisory
  # Flags tests that contain loop logic.
  test-quality.loop-in-test:
    enabled: true
  # Flags tests that do not appear to assert behavior.
  test-quality.no-assertions:
    enabled: true
  # Flags tests that sleep instead of synchronizing on behavior.
  test-quality.sleep-in-test:
    enabled: true
  # Flags assertions that prove literals or constants instead of behavior.
  test-quality.trivial-assertion:
    enabled: true
  # Flags unwrap calls in tests.
  test-quality.unwrap-in-test:
    enabled: true
  # Flags clone calls that may be avoidable.
  waste.unnecessary-clone-candidate:
    enabled: true
  # Flags statements after terminating statements.
  waste.unreachable-code:
    enabled: true
  # Flags unwrap and expect calls outside test attributes.
  waste.unwrap-expect:
    enabled: true

# Scoped suppressions. Rules remain enabled globally; each entry documents why
# a specific path or message pattern is exempt. See docs/configuration.md.
exclude:
  # ----- Calibration fixtures contain deliberate bad patterns by design -----
  # `src/tests/calibration/cases_*.rs` write fake credentials into tempdirs to
  # verify sensitive-data rules fire. The literals here are test inputs, not
  # real secrets. See `run_calibration_case` in `src/tests/calibration/mod.rs`.
  - rule: sensitive-data.api-key-pattern
    paths: ["src/tests/calibration/**"]
    reason: "Calibration fixture: deliberately-bad pattern used to verify the rule fires."
  - rule: sensitive-data.aws-access-key
    paths: ["src/tests/calibration/**"]
    reason: "Calibration fixture: deliberately-bad pattern used to verify the rule fires."
  - rule: sensitive-data.database-url-password
    paths: ["src/tests/calibration/**"]
    reason: "Calibration fixture: deliberately-bad pattern used to verify the rule fires."
  - rule: sensitive-data.url-embedded-credentials
    paths: ["src/tests/calibration/**"]
    reason: "Calibration fixture: deliberately-bad pattern used to verify the rule fires."
  - rule: sensitive-data.hardcoded-env-value
    paths: ["src/tests/calibration/**"]
    reason: "Calibration fixture: deliberately-bad pattern used to verify the rule fires."
  - rule: sensitive-data.jwt-token
    paths: ["src/tests/calibration/**"]
    reason: "Calibration fixture: deliberately-bad pattern used to verify the rule fires."

  # `cases_a/b/c.rs` each expose a flat `vec![case(...), case(...), ...]`
  # registry with one entry per rule. Token volume is structural, not
  # algorithmic; splitting would add indirection without clarity.
  - rule: metrics.halstead-volume
    paths: ["src/tests/calibration/**"]
    reason: "Flat calibration-case registry: volume is structural, not algorithmic."
  - rule: metrics.maintainability-pressure
    paths: ["src/tests/calibration/**"]
    reason: "Flat calibration-case registry: volume is structural, not algorithmic."

  # `rule_calibration_matrix_covers_every_rule` exists to iterate every case
  # and assert positive-fires / negative-silent. Loop and conditional are
  # intrinsic to its purpose.
  - rule: test-quality.conditional-logic
    paths: ["src/tests/calibration/mod.rs"]
    reason: "Meta-test iterates every calibration case; conditional is intrinsic."
  - rule: test-quality.loop-in-test
    paths: ["src/tests/calibration/mod.rs"]
    reason: "Meta-test iterates every calibration case; loop is intrinsic."

  # ----- Binary crate root -----
  # `src/main.rs` is the binary entry that wires every top-level module
  # together. High fan-out is normal for a CLI root; the rule still applies
  # everywhere else in the tree.
  - rule: architecture.module-fan-out
    paths: ["src/main.rs"]
    reason: "Binary crate root: naturally enumerates all top-level modules."

  # ----- Cargo.lock transitive duplicates -----
  # `hashbrown` and `wit-bindgen` are locked at two versions each because
  # transitive deps pin different majors. Unifying would require [patch]
  # directives, which risk breaking those deps.
  - rule: dependency.duplicate-locked-version
    message_contains: "hashbrown"
    reason: "Transitive duplicate; unifying would require risky [patch] directives."
  - rule: dependency.duplicate-locked-version
    message_contains: "wit-bindgen"
    reason: "Transitive duplicate; unifying would require risky [patch] directives."

  # ----- Long integration tests with shared setup -----
  # These tests bundle multiple assertions against expensive setup (write
  # config + run analyser end-to-end). Splitting multiplies setup cost.
  - rule: test-quality.long-test
    paths:
      - "src/tests/config_and_selectors/custom_rules.rs"
      - "src/tests/config_and_selectors/exclusions.rs"
    reason: "Integration tests bundle assertions sharing expensive setup."
